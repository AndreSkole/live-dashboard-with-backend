services:
  postgres:
    image: postgres:16-alpine
    container_name: sports_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: volsdals123
      POSTGRES_DB: sportsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
